# General settings
spring.application.name=inventory
server.port=8081

# H2 Configuration (Default Profile)
spring.datasource.url=jdbc:h2:mem:erpdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration (Key must be at least 256-bit)
erp.jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250655368566D5970
erp.jwt.expirationMs=86400000

# Enable request payload logging
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=ERROR
